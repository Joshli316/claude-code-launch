<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — CodeLaunch 码上出发</title>
  <meta name="description" content="Page not found — CodeLaunch 码上出发">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #FFF8F0; color: #1A1A2E; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 480px; }
    .code { font-size: 6rem; font-weight: 900; color: #FF6B4A; line-height: 1; }
    h1 { font-size: 1.5rem; margin: 16px 0 8px; }
    p { color: #5A5A72; margin-bottom: 24px; }
    a { display: inline-block; background: #FF6B4A; color: #fff; padding: 12px 32px; border-radius: 9999px; text-decoration: none; font-weight: 600; transition: transform 0.2s; }
    a:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>页面未找到 / Page Not Found</h1>
    <p>你访问的页面不存在。可能是链接错了，或者页面已经被移动了。<br><span style="font-size:0.9em;color:#8A8A9A;">The page you're looking for doesn't exist. The link may be broken or the page may have moved.</span></p>
    <a href="/#/">返回首页 Back Home</a>
  </div>
</body>
</html>
